name: Auto Deploy to Local

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to local Windows machine via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd "C:\Users\User\dockerNodeJS"
            git pull origin main
            npm install
            taskkill /f /im node.exe >nul 2>&1 || echo "No running process"
            start /min cmd /c "npm run dev"
          EOF
